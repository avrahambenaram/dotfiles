$font = Monospace

general {
    hide_cursor = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 4
}

input-field {
    monitor =
    size = 18%, 4%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.2) # no fill

    outer_color = rgba(ca9ee6ee) rgba(f5bde6ee) 45deg
    check_color = rgba(a6da95ee) rgba(8bd5caee) 120deg
    fail_color = rgba(ed8796ee) rgba(f5bde6ee) 40deg

    font_color = rgb(143, 143, 143)
    fade_on_empty = false
    rounding = 15

    font_family = $font
    placeholder_text = <i>Input your password</i>
    fail_text = $PAMFAIL

    dots_spacing = 0.3

    position = 0, 200
    halign = center
    valign = end
}

image {
    monitor =
    path = ~/.config/hypr/assets/lock.png
    border_size = 0
    rounding = 0
    size = 28

    position = -125, 207
    halign = center
    valign = end
    zindex = 99
}

label {
    monitor =
    text = cmd[update:1000] echo "<i>$(date +"%I")</i>"
    color = rgba(202, 211, 245, 1)
    font_size = 125
    position = -80, 190
    halign = center
    valign = center
}

# Time-Minute
label {
    monitor =
    text = cmd[update:1000] echo "<i>$(date +"%M")</i>"
    color = rgba(138, 173, 244, 1)
    font_size = 125
    position = 0, 70
    halign = center
    valign = center
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B" # update every 60 seconds
    font_size = 25
    font_family = $font
    color = rgba(184, 192, 224, 1)

    position = 0, -150
    halign = center
    valign = center
}

label {
  monitor =
  text = cmd[update:60000] echo "<i>$(~/.config/hypr/scripts/weather)</i>"
  font_size = 20
  font_family = $font
  color = rgba(202, 211, 245, 0.8)
  
  position = 0, -200
  halign = center
  valign = center
}
